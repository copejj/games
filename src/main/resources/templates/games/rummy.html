<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
	<!-- Your common-head fragment includes Alpine and Tailwind -->
	<head th:replace="~{fragments/common :: common-head(title='Rummy')}"></head>

	<body class="bg-gray-100 min-h-screen flex flex-col">
		<div th:replace="~{fragments/layout :: header}"></div>

		<main class="p-4 max-w-md mx-auto flex-grow">
			<!-- Bind to the 'rummyApp' defined in main.js -->
			<div x-data="rummyApp" class="space-y-4">

				<!-- Top Controls -->
				<div class="flex gap-3 mb-6">
					<button @click="addPlayer" class="flex-1 bg-blue-600 text-white font-bold py-3 px-2 rounded-xl">+ Player</button>
					<button @click="resetScores" class="flex-1 bg-amber-500 text-white font-bold py-3 px-2 rounded-xl">Reset Scores</button>
					<button @click="resetGame" class="flex-1 bg-red-600 text-white font-bold py-3 px-2 rounded-xl text-sm">Full Reset</button>
				</div>

				<!-- Player Cards -->
				<template x-for="(player, index) in players" :key="index">
					<!-- DEALER HIGHLIGHT: Added ring-4 and border-blue-500 if index matches dealerIndex -->
					<div :class="index === dealerIndex ? 'ring-4 ring-blue-400 border-blue-500' : 'border-gray-100'"
						class="bg-white rounded-2xl shadow-sm border p-5 mb-4 transition-all duration-300">
						
						<div class="flex justify-between items-center mb-4">
							<div>
								<span x-show="index === dealerIndex" class="text-[10px] bg-blue-600 text-white px-2 py-0.5 rounded-full font-bold uppercase block w-min mb-1">Dealer</span>
								<input type="text" x-model="player.name" placeholder="Player Name" class="text-xl font-extrabold outline-none bg-transparent">
							</div>
							<div class="text-3xl font-mono font-black text-blue-600" x-text="calculateTotal(player)"></div>
						</div>

						<!-- Input for this player's round score -->
						<input type="number" inputmode="numeric" x-model.number="player.tempScore" 
							placeholder="Enter round score"
							class="w-full bg-gray-50 border-none rounded-xl px-4 py-3 focus:ring-2 focus:ring-blue-500 text-lg">
						
						<!-- Round History -->
						<div class="mt-3 flex gap-1 overflow-x-auto no-scrollbar">
							<template x-for="score in player.history">
								<span class="bg-gray-100 text-gray-500 text-xs px-2 py-1 rounded-full" x-text="score"></span>
							</template>
						</div>
					</div>
				</template>

				<!-- GLOBAL SAVE BUTTON -->
				<button @click="saveRound" 
						class="w-full mt-4 bg-green-600 text-white font-black py-5 rounded-2xl shadow-xl active:scale-95 transition-transform sticky bottom-4">
					SAVE ROUND
				</button>
			</div>
		</main>

		<!-- Link to rummy.js file -->
		<script th:src="@{/js/rummy.js}"></script>

		<div th:replace="~{fragments/layout :: footer}"></div>
		<div th:replace="~{fragments/common :: scripts}"></div>
	</body>
</html>
