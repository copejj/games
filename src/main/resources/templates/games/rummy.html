<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
	<head th:replace="~{fragments/common :: common-head(title='Rummy')}"></head>

	<body class="bg-gray-100 min-h-screen flex flex-col" x-data='rummyApp' @open-settings.window="showSettings = true">
		<div th:replace="~{fragments/layout :: header(~{:: #settings-btn})}">
			<button id="settings-btn" @click="$dispatch('open-settings')" class="p-1 hover:bg-blue-700 rounded-lg transition-colors">
				<svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
					<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path>
					<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
				</svg>
			</button>
		</div>

		<main class="p-4 max-w-md landscape:max-w-4xl mx-auto flex-grow">
			<!-- Settings Modal -->
			<div x-show="showSettings" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/50" x-cloak>
				<div class="bg-white rounded-3xl p-6 max-w-sm w-full shadow-2xl" @click.away="showSettings = false">
					<h3 class="text-xl font-bold mb-4 text-gray-800">Game Settings</h3>
					<label class="block text-sm font-bold text-gray-600 mb-1">Score Limit</label>
					<input type="number" x-model.number="maxScore" class="w-full border-2 rounded-xl p-3 mb-6 focus:border-blue-500 outline-none text-gray-800">
					<button @click="showSettings = false" class="w-full bg-blue-600 text-white font-bold py-3 rounded-xl hover:bg-blue-700">Save & Close</button>
				</div>
			</div>

			<!-- Winner Modal -->
			<div x-show="winner" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm" x-cloak>
				<div class="bg-white rounded-3xl p-8 max-w-sm w-full shadow-2xl text-center border-4 border-green-500">
					<h2 class="text-3xl font-black text-gray-800 mb-2">Winner!</h2>
					<div class="text-4xl font-mono font-black text-blue-600 mb-2" x-text="winner?.name"></div>
					<p class="text-gray-500 mb-6 italic">Finished with <span class="font-bold text-gray-800" x-text="winner ? calculateTotal(winner) : 0"></span> points</p>
					<button @click="winner = null" class="w-full bg-gray-800 text-white font-bold py-4 rounded-xl hover:bg-black transition">Close & Review</button>
				</div>
			</div>

			<!-- Controls -->
			<div class="flex flex-wrap landscape:flex-nowrap gap-2 mb-4 w-full">
				<button @click="addPlayer" class="flex-1 bg-blue-600 text-white font-bold py-3 landscape:py-2 px-2 rounded-xl text-sm whitespace-nowrap"> Add Player </button>
				<button @click="resetGame" class="flex-1 bg-red-600 text-white font-bold py-3 landscape:py-2 px-2 rounded-xl text-sm whitespace-nowrap"> Reset All </button>
				<button @click="resetScores" class="flex-1 bg-amber-500 text-white font-bold py-3 landscape:py-2 px-2 rounded-xl text-sm whitespace-nowrap"> Reset Scores </button>
				<button @click="resetLastRound" class="flex-1 bg-gray-600 text-white font-bold py-3 landscape:py-2 px-2 rounded-xl text-sm whitespace-nowrap"> Reset Last Round </button>
			</div>

			<!-- Player Cards -->
			<div class="flex flex-wrap gap-4 justify-center">
				<template x-for="(player, index) in players" :key="index">
					<div :class="index === dealerIndex ? 'ring-4 ring-blue-400 border-blue-500' : 'border-gray-100'"
						class="relative bg-white rounded-2xl shadow-sm border p-5 transition-all duration-300 w-full sm:w-[calc(50%-1rem)] lg:w-[calc(33.3%-1rem)] min-w-[280px]">
						<div class="flex justify-between items-center mb-4">
							<span x-show="index === dealerIndex" class="absolute -top-3 left-4 text-[11px] bg-blue-600 text-white px-3 py-1 rounded-xl font-bold uppercase tracking-wider shadow-md bg-blue-400"> Dealer </span>
							<div class="flex justify-between items-center mb-4 pt-1">
								<input type="text" x-model="player.name" placeholder="Player Name" 
									class="text-xl font-extrabold outline-none bg-transparent w-full">
								<div class="text-3xl font-mono font-black text-blue-600" x-text="calculateTotal(player)"></div>
							</div>
						</div>

						<input type="number" inputmode="numeric" x-model.number="player.tempScore" 
							placeholder="Enter round score"
							class="w-full bg-gray-50 border-none rounded-xl px-4 py-3 focus:ring-2 focus:ring-blue-500 text-lg">
						
						<div class="mt-3 flex gap-1 overflow-x-auto no-scrollbar">
							<template x-for="score in player.history">
								<span class="bg-gray-100 text-gray-500 text-xs px-2 py-1 rounded-full" x-text="score"></span>
							</template>
						</div>
					</div>
				</template>
			</div>

			<!-- Save Button -->
			<button @click="saveRound" class="w-full sticky bottom-4 mt-4 bg-green-600 text-white font-black py-5 rounded-2xl shadow-xl active:scale-95 transition-transform sticky bottom-4"> SAVE ROUND </button>
		</main>

		<script th:src="@{/js/rummy.js}"></script>

		<div th:replace="~{fragments/layout :: footer}"></div>
		<div th:replace="~{fragments/common :: scripts}"></div>
	</body>
</html>
